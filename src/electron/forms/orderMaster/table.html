<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Form with Add Child Button</title>
  <style>
    table {
      width: 100%;
      border-collapse: collapse;
    }
    table, th, td {
      border: 1px solid black;
    }
    th, td {
      padding: 8px;
      text-align: left;
    }
    form {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div id="form-container"></div>

  <script>
    const formConfig = {
      "main": {
        "fields": [
          {
            "label": "Order Design",
            "name": "order_design",
            "type": "table",
            "add_row": true,
            "formName": "orderDesign"
          },
          {
            "label": "Rate Chart",
            "name": "rate_chart",
            "type": "table",
            "add_row": true,
            "formName": "orderRateChart",
            "parentfield": "order_design"
          }
        ],
        "formName": "OrderMaster"
      },
      "childForms": {
        "orderDesign": {
          "fields": [
            {
              "label": "Design Code",
              "name": "design_code",
              "type": "text",
              "show": true
            },
            {
              "label": "Add Child",
              "name": "_add_child",
              "type": "button",
              "show": true
            }
          ],
          "formName": "orderDesign"
        },
        "orderRateChart": {
          "fields": [
            {
              "label": "Category",
              "name": "category",
              "type": "text",
              "show": true
            },
            {
              "label": "Sub Category",
              "name": "sub_category",
              "type": "text",
              "show": true
            }
          ],
          "formName": "orderRateChart"
        }
      }
    };

    // Dynamically Construct the Data Store
    const dataStore = constructDataStore(formConfig);

    function constructDataStore(config) {
      const store = {};
      const mainFields = config.main.fields;

      mainFields.forEach(field => {
        if (field.type === 'table') {
          if (!field.parentfield) {
            store[field.name] = [];
          }
        }
        else{
            store[field.name] = null
        }
      });

      return store;
    }

    function generateForm(config) {
      const container = document.getElementById('form-container');
      const mainForm = createForm(config.main);
      container.appendChild(mainForm);
    }

    function createForm(formConfig) {
      const form = document.createElement('form');
      form.setAttribute('name', formConfig.formName);

      formConfig.fields.forEach(field => {
        if (field.type === 'table') {
          const table = createTable(field, formConfig.formName);
          form.appendChild(table);
        }
      });

      return form;
    }

    function createTable(tableField, parentFormName) {
      const wrapper = document.createElement('div');
      wrapper.style.marginBottom = '20px';

      const label = document.createElement('h3');
      label.textContent = tableField.label;
      wrapper.appendChild(label);

      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const tbody = document.createElement('tbody');
      tbody.setAttribute('data-formName', tableField.formName);

      const headerRow = document.createElement('tr');
      const rowFields = formConfig.childForms[tableField.formName];
      rowFields.fields.forEach(rowField => {
        if (rowField.show) {
          const th = document.createElement('th');
          th.textContent = rowField.label || rowField.name;
          headerRow.appendChild(th);
        }
      });
      thead.appendChild(headerRow);

      table.appendChild(thead);
      table.appendChild(tbody);
      wrapper.appendChild(table);

      if (tableField.add_row) {
        const addButton = document.createElement('button');
        addButton.setAttribute('data-formName', tableField.formName)
        addButton.textContent = 'Add Row';
        addButton.type = 'button';
        addButton.onclick = () => addRow(tableField.formName, tableField.parentfield);
        wrapper.appendChild(addButton);
      }

      return wrapper;
    }

    function addRow(formName, parentField) {
      const childForm = formConfig.childForms[formName];
      const tbody = document.querySelector(`tbody[data-formName="${formName}"]`);
      const row = document.createElement('tr');
      const rowData = { id: generateUniqueId(), data: {} };

      childForm.fields.forEach(field => {
        const td = document.createElement('td');
        const input = document.createElement('input');
        input.type = 'text';
        input.name = field.name;

        input.oninput = e => {
          rowData.data[field.name] = e.target.value;
        };

        td.appendChild(input);
        row.appendChild(td);
      });

      if (parentField) {
        // Add to parent entry
        const parentTbody = document.querySelector(`tbody[data-formName="${parentField}"]`);
        const parentRows = Array.from(parentTbody.rows);
        const lastParentRow = parentRows[parentRows.length - 1];
        const parentId = lastParentRow ? lastParentRow.dataset.id : null;

        if (parentId) {
          const parent = dataStore[parentField].find(item => item.id === parentId);
          if (parent) {
            parent[formName] = parent[formName] || [];
            parent[formName].push(rowData);
          }
        } else {
          alert('No parent row found. Add a parent first.');
        }
      } else {
        // Add to top-level dataStore
        dataStore[formName].push(rowData);
      }

      tbody.appendChild(row);
      console.log("Updated DataStore:", dataStore);
    }

    function generateUniqueId() {
      return '_' + Math.random().toString(36).substr(2, 9);
    }

    function addChildRow(parentId, formName) {
      const parentForm = formConfig.childForms[parentId];
      const childFormName = formName;

      if (!childFormName) {
        alert('No child form found for this parent.');
        return;
      }

      const childForm = formConfig.childForms[childFormName];
      const childTbody = document.querySelector(`tbody[data-formName="${childFormName}"]`);
      const row = document.createElement('tr');
      const rowData = { data: {} };

      childForm.fields.forEach(field => {
        const td = document.createElement('td');
        const input = document.createElement('input');
        input.type = 'text';
        input.name = field.name;

        input.oninput = e => {
          rowData.data[field.name] = e.target.value;
        };

        td.appendChild(input);
        row.appendChild(td);
      });

      const parent = dataStore[parentForm].find(item => item.id === parentId);
      if (parent) {
        parent[childFormName] = parent[childFormName] || [];
        parent[childFormName].push(rowData);
        childTbody.appendChild(row);
        console.log("Updated DataStore:", dataStore);
      } else {
        alert('Parent row not found!');
      }
    }

    generateForm(formConfig);
  </script>
</body>
</html>
